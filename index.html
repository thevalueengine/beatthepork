<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const API_URL="https://beat-the-pork-ai.ben-e48.workers.dev/";

const USERS={
  ben:{name:"Ben",cal:1400,color:"ben"},
  deb:{name:"Debbie",cal:1100,color:"deb"}
};

const MEAL_SLOTS=[
  {key:"breakfast",label:"Breakfast",icon:"🌅"},
  {key:"lunch",label:"Lunch",icon:"☀️"},
  {key:"dinner",label:"Dinner",icon:"🌙"},
  {key:"snacks",label:"Snacks",icon:"🍎"},
];

function emptyMeals(){return{breakfast:"",lunch:"",dinner:"",snacks:""}}

function gs(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function initData(){
  const d={};
  ["ben","deb"].forEach(u=>{
    d[u]={
      weights:gs(`btp_${u}_weights`)||[],
      checkins:gs(`btp_${u}_checkins`)||[],
      meals:gs(`btp_${u}_meals`)||getDefaultMeals(u)
    };
  });
  return d;
}

function getDefaultMeals(user){
  const shared=[
    {id:"m1",name:"Chicken & veg",owner:"shared",desc:"Grilled chicken breast with roasted vegetables",calories:380,protein:"High",carbs:"Low"},
    {id:"m2",name:"Greek yoghurt bowl",owner:"shared",desc:"Full-fat Greek yoghurt with berries and mixed seeds",calories:250,protein:"Good",carbs:"Low"},
    {id:"m3",name:"Eggs & salad",owner:"shared",desc:"Two scrambled or fried eggs with mixed leaf salad",calories:280,protein:"Good",carbs:"Very Low"},
    {id:"m4",name:"Omelette lunch",owner:"shared",desc:"3-egg omelette with cheese and vegetables",calories:350,protein:"High",carbs:"Very Low"},
    {id:"m5",name:"Steak & veg",owner:"shared",desc:"Sirloin steak with seasonal vegetables",calories:480,protein:"Very High",carbs:"Low"},
    {id:"m6",name:"Tuna salad",owner:"shared",desc:"Tinned tuna with mixed leaves, cucumber and olive oil",calories:220,protein:"High",carbs:"Very Low"},
    {id:"m7",name:"Chicken curry no rice",owner:"shared",desc:"Chicken curry without rice",calories:400,protein:"High",carbs:"Low"},
  ];
  const benM=[{id:"bm1",name:"Ben's standard breakfast",owner:"ben",desc:"Greek yoghurt, mixed nuts, berries",calories:300,protein:"Good",carbs:"Low"}];
  const debM=[{id:"dm1",name:"Debbie's yoghurt bowl",owner:"deb",desc:"Greek yoghurt with seeds and fruit",calories:200,protein:"Good",carbs:"Low"}];
  return user==="ben"?[...shared,...benM]:[...shared,...debM];
}

function today(){return new Date().toISOString().split("T")[0]}
function formatDate(d){return new Date(d+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"})}
function formatDateFull(d){return new Date(d+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}
function weekStart(dateStr){const d=new Date(dateStr+"T12:00:00");const day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d.toISOString().split("T")[0]}
function weekLabel(monStr){const mon=new Date(monStr+"T12:00:00");const sun=new Date(mon);sun.setDate(sun.getDate()+6);return`${formatDate(monStr)} – ${formatDate(sun.toISOString().split("T")[0])}`}
function scoreWeek(days){const vals={green:3,amber:2,red:1};const logged=days.filter(d=>d.score);if(!logged.length)return null;return Math.round((logged.reduce((s,d)=>s+(vals[d.score]||0),0)/(logged.length*3))*100)}
function weekGrade(pct){if(pct===null)return null;if(pct>=80)return"A";if(pct>=60)return"B";if(pct>=40)return"C";return"D"}
function groupByWeek(checkins){
  const weeks={};
  checkins.forEach(c=>{const ws=weekStart(c.date);if(!weeks[ws])weeks[ws]=[];weeks[ws].push(c);});
  return Object.entries(weeks).sort((a,b)=>b[0].localeCompare(a[0])).map(([ws,days])=>{
    const pct=scoreWeek(days);
    const slots=[];
    for(let i=0;i<7;i++){const d=new Date(ws+"T12:00:00");d.setDate(d.getDate()+i);const ds=d.toISOString().split("T")[0];slots.push({date:ds,day:["M","T","W","T","F","S","S"][i],score:days.find(c=>c.date===ds)?.score||null});}
    return{ws,days,slots,pct,grade:weekGrade(pct)};
  });
}
function getStreak(checkins){
  if(!checkins.length)return 0;
  const sorted=[...checkins].sort((a,b)=>b.date.localeCompare(a.date));
  let streak=0,cur=new Date();cur.setHours(12,0,0,0);
  for(const ci of sorted){const d=new Date(ci.date+"T12:00:00");const diff=Math.round((cur-d)/(1000*60*60*24));if(diff<=1&&ci.score==="green"){streak++;cur=d;}else if(diff>1)break;}
  return streak;
}

// Guess the meal slot from time of day
function guessSlot(){
  const h=new Date().getHours();
  if(h<11)return"breakfast";
  if(h<15)return"lunch";
  if(h<20)return"dinner";
  return"snacks";
}

// Append text to a slot value neatly
function appendToSlot(existing,addition){
  const a=addition.trim();
  if(!a)return existing;
  if(!existing.trim())return a;
  return existing.trimEnd()+"\n"+a;
}

async function callAI(prompt,maxTokens=800){
  const resp=await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})
  });
  if(!resp.ok){const err=await resp.text();throw new Error(`Worker ${resp.status}: ${err}`);}
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message||"API error");
  return JSON.parse((data.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
}

// ── Continuous voice hook ─────────────────────────────────────────
function useContinuousVoice(){
  const [activeKey,setActiveKey]=useState(null);
  const [interim,setInterim]=useState("");
  const [supported,setSupported]=useState(true);
  const rRef=useRef(null);
  const committedRef=useRef("");
  const cbRef=useRef(null);
  const shouldRunRef=useRef(false);

  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setSupported(false);return;}
    const r=new SR();
    r.continuous=true;r.interimResults=true;r.lang="en-GB";
    r.onresult=e=>{
      let fin="",int="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)fin+=e.results[i][0].transcript+" ";
        else int+=e.results[i][0].transcript;
      }
      if(fin){committedRef.current+=fin;if(cbRef.current)cbRef.current(committedRef.current);}
      setInterim(int);
    };
    r.onerror=e=>{if(e.error==="no-speech"&&shouldRunRef.current){try{r.start();}catch(_){}}else{shouldRunRef.current=false;setActiveKey(null);setInterim("");}};
    r.onend=()=>{if(shouldRunRef.current){try{r.start();}catch(_){}}};
    rRef.current=r;
    return()=>{shouldRunRef.current=false;try{r.stop();}catch(_){}};
  },[]);

  function start(key,existingText,cb){
    if(!rRef.current)return;
    shouldRunRef.current=false;
    try{rRef.current.stop();}catch(_){}
    committedRef.current=existingText?(existingText.trimEnd()+"\n"):"";
    cbRef.current=cb;
    setActiveKey(key);setInterim("");
    shouldRunRef.current=true;
    setTimeout(()=>{try{rRef.current.start();}catch(_){}},120);
  }

  function stop(){
    shouldRunRef.current=false;
    try{rRef.current.stop();}catch(_){}
    setActiveKey(null);setInterim("");committedRef.current="";
  }

  function toggle(key,existingText,cb){
    if(activeKey===key)stop();
    else start(key,existingText,cb);
  }

  return{activeKey,interim,supported,toggle,stop};
}

// ── Meal slot — running diary style ──────────────────────────────
function MealSlot({slot,value,onChange,voice}){
  const [addText,setAddText]=useState("");
  const isListening=voice.activeKey===slot.key;
  const isAddListening=voice.activeKey===slot.key+"_add";

  function handleMainVoice(){
    // Main mic: append to full content
    voice.toggle(slot.key,value,newVal=>onChange(newVal));
  }

  function handleAddVoice(){
    // Add-more mic: appends just the new addition
    voice.toggle(slot.key+"_add","",transcript=>{
      setAddText(transcript.trim());
    });
  }

  function commitAdd(){
    if(!addText.trim())return;
    onChange(appendToSlot(value,addText));
    setAddText("");
    voice.stop();
  }

  function handleAddKey(e){
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();commitAdd();}
  }

  // Auto-commit when voice finishes a natural pause for the add field
  // (user taps stop then we commit)

  return(
    <div className={`meal-slot${value?" has-content":""}${(isListening||isAddListening)?" is-listening":""}`}>
      <div className="meal-slot-header">
        <span className="meal-slot-icon">{slot.icon}</span>
        <div style={{flex:1}}>
          <div className="meal-slot-title">{slot.label}</div>
          {value&&<div className="meal-slot-logged">✓ Logged</div>}
        </div>
        {/* Main mic — replaces/appends full content via voice */}
        <button
          type="button"
          className={`meal-voice-btn ${isListening?"listening":"idle"}`}
          onClick={handleMainVoice}
          title={isListening?"Stop":"Speak to set "+slot.label}
        >{isListening?"⏹":"🎙️"}</button>
      </div>

      {/* Existing content — editable textarea */}
      {(value||isListening)&&(
        <textarea
          style={{width:"100%",background:"#161920",border:"none",borderRadius:8,padding:"10px 12px",color:"#e8eaf0",fontFamily:"Open Sans",fontSize:14,outline:"none",resize:"none",lineHeight:1.6,minHeight:60}}
          value={value}
          onChange={e=>onChange(e.target.value)}
          placeholder={"What did you have for "+slot.label.toLowerCase()+"?"}
        />
      )}

      {isListening&&(
        <>
          <div className="listening-bar" style={{marginTop:8}}><div className="listening-dot"/><span>Listening — keep talking, tap ⏹ when done</span></div>
          {voice.interim&&<div className="interim-text">{voice.interim}</div>}
        </>
      )}

      {/* Add more row — shown when there's already content */}
      {value&&!isListening&&(
        <div className="meal-add-row" style={{marginTop:8}}>
          <input
            type="text"
            className="meal-add-input"
            placeholder="+ Add more…"
            value={isAddListening?(addText+(voice.interim?" ("+voice.interim+"…)":"")):addText}
            onChange={e=>setAddText(e.target.value)}
            onKeyDown={handleAddKey}
          />
          <button
            type="button"
            className={`meal-add-voice ${isAddListening?"listening":"idle"}`}
            onClick={handleAddVoice}
            title={isAddListening?"Stop":"Speak to add more"}
          >{isAddListening?"⏹":"🎙️"}</button>
          <button
            className="meal-add-submit"
            disabled={!addText.trim()&&!isAddListening}
            onClick={()=>{
              if(isAddListening){voice.stop();if(addText.trim()){onChange(appendToSlot(value,addText));setAddText("");}}
              else{commitAdd();}
            }}
          >{isAddListening?"Done":"Add"}</button>
        </div>
      )}

      {/* Empty state prompt */}
      {!value&&!isListening&&(
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button
            type="button"
            className={`meal-add-voice ${isAddListening?"listening":"idle"}`}
            style={{width:36,height:36}}
            onClick={handleAddVoice}
          >{isAddListening?"⏹":"🎙️"}</button>
          <input
            type="text"
            className="meal-add-input"
            placeholder={"What did you have for "+slot.label.toLowerCase()+"?"}
            value={isAddListening?(addText+(voice.interim?" ("+voice.interim+"…)":"")):addText}
            onChange={e=>setAddText(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();if(addText.trim()){onChange(addText.trim());setAddText("");}}}}
          />
          {addText.trim()&&(
            <button className="meal-add-submit" onClick={()=>{onChange(addText.trim());setAddText("");}}>Add</button>
          )}
        </div>
      )}

      {isAddListening&&(
        <div className="listening-bar" style={{marginTop:8}}><div className="listening-dot"/><span>Listening — tap Done when finished</span></div>
      )}

      {value&&<button className="meal-clear-btn" onClick={()=>onChange("")}>Clear</button>}
    </div>
  );
}

  );
}

      )}

      <div className="tab-bar">
        {[["today","Today"],["progress","Progress"],["weeks","Weeks"],["meals","Meals"],["history","History"]].map(([t,l])=>(
          <button key={t} className={`tab-btn${tab===t?" active":""}`} onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>

      {tab==="today"&&(
        <>
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-val">{latestW?`${latestW.weight}kg`:"–"}</div><div className="stat-label">Current weight</div></div>
            <div className="stat-card"><div className={`stat-val ${lost>0?"":"warn"}`}>{lost>0?`-${lost}kg`:lost<0?`+${Math.abs(lost)}kg`:"–"}</div><div className="stat-label">Lost so far</div></div>
            <div className="stat-card"><div className="stat-val" style={{color:"#fbbf24"}}>{streak}</div><div className="stat-label">🟢 Green streak</div></div>
            <div className="stat-card">
              <div className="stat-val" style={{color:currentWeek?.grade==="A"?"#4ade80":currentWeek?.grade==="B"?"#60a5fa":currentWeek?.grade==="C"?"#fbbf24":currentWeek?.grade==="D"?"#f87171":"#6b7280"}}>
                {currentWeek?.pct!=null?`${currentWeek.pct}%`:"–"}
              </div>
              <div className="stat-label">This week's score</div>
            </div>
          </div>

          {/* Today's food card */}
          <div className="today-food-card">
            <div className="today-food-header">
              <div className="today-food-title">Today's food log</div>
              {todayCI?.score&&<ScoreBadge score={todayCI.score}/>}
            </div>
            {todayCI?.analysis&&<div style={{fontSize:12,color:"#6b7280",marginBottom:10,lineHeight:1.4}}>{todayCI.analysis.summary}</div>}
            {MEAL_SLOTS.map(s=>(
              <div key={s.key} className="today-slot-row">
                <span className="today-slot-icon">{s.icon}</span>
                <span className="today-slot-label">{s.label}</span>
                <span className={`today-slot-val${!todayMeals[s.key]?" empty":""}`}>
                  {todayMeals[s.key]||"Not logged yet"}
                </span>
              </div>
            ))}
          </div>

          {/* Primary action: big quick log button */}
          <button className="action-btn green" onClick={()=>setModal("quicklog")}>
            <div className="btn-icon" style={{background:"#16a34a"}}>➕</div>
            <div><div style={{fontWeight:700}}>Log what you're eating now</div><div style={{fontSize:12,opacity:0.8,marginTop:2}}>Speak or type — adds to the right meal</div></div>
          </button>

          {/* Secondary: full log editor */}
          <button className="action-btn primary" onClick={()=>setModal("checkin")}>
            <div className="btn-icon" style={{background:"#2563eb"}}>📝</div>
            {hasAnyMeal?"Edit full day log & get AI score":"Open full day log"}
          </button>

          <button className="action-btn" onClick={()=>setModal("weight")}>
            <div className="btn-icon" style={{background:"#374151"}}>⚖️</div>Log weight
          </button>

          {currentWeek&&<WeekCard week={currentWeek} isCurrentWeek={true}/>}
        </>
      )}

      {tab==="progress"&&(
        <>
          {streak>0&&<div className="streak-badge">🔥 {streak} day green streak — keep it going!</div>}
          <div className="chart-card"><div className="chart-title">Weight over time</div><WeightChart weights={weights}/></div>
          <div className="chart-card">
            <div className="chart-title">Last 30 days</div>
            {!calHistory.length?<div className="no-data">No check-ins yet</div>:(
              <div className="calendar-grid">{calHistory.map(c=><div key={c.date} className={`cal-dot ${c.score||"empty"}`} title={formatDate(c.date)}>{new Date(c.date+"T12:00:00").getDate()}</div>)}</div>
            )}
          </div>
          <div className="section-title">Insights</div>
          {greenCount>=5&&<div className="insight-card">🌟 You've had {greenCount} green days this week — fantastic consistency!</div>}
          {lost>0&&<div className="insight-card">📉 Weight trend moving in the right direction. {lost} kg down so far.</div>}
          {amberCount>2&&<div className="insight-card">💛 A few amber days this week — converting one more to green would be great.</div>}
          {streak>=7&&<div className="insight-card">🔥 Seven days of green — that's a real habit forming!</div>}
          {!checkins.length&&<div className="insight-card">Start logging your days to see personalised insights here.</div>}
        </>
      )}

      {tab==="weeks"&&(
        <>
          <div className="chart-card"><div className="chart-title">Weekly score trend</div><WeeklyChart weeks={weeks}/></div>
          <div style={{display:"flex",gap:10,marginBottom:16,fontSize:11,color:"#6b7280",flexWrap:"wrap"}}>
            {[["A","≥80%","#4ade80"],["B","60–79%","#60a5fa"],["C","40–59%","#fbbf24"],["D","<40%","#f87171"]].map(([g,r,c])=>(
              <div key={g} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:c}}/><span>{g}: {r}</span></div>
            ))}
          </div>
          <div className="section-title">Week by week</div>
          {!weeks.length&&<div className="no-data">No data yet — start logging!</div>}
          {weeks.map(w=><WeekCard key={w.ws} week={w} isCurrentWeek={w.ws===weekStart(today())}/>)}
        </>
      )}

      {tab==="meals"&&(
        <>
          <button className="action-btn primary" onClick={()=>setModal("addmeal")}><div className="btn-icon" style={{background:"#2563eb"}}>+</div>Save a new meal</button>
          <div className="section-title">Your saved meals</div>
          {meals.filter(m=>m.owner===user||m.owner==="shared").map(m=>(
            <div key={m.id} className="saved-meal-card">
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{m.name}</div>
              <div style={{fontSize:12,color:"#6b7280"}}>~{m.calories} kcal · Protein: {m.protein} · Carbs: {m.carbs}</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>{m.desc}</div>
            </div>
          ))}
        </>
      )}

      {tab==="history"&&(
        <>
          <div className="section-title">Check-in history</div>
          {!checkins.length&&<div className="no-data">No check-ins yet. Start logging!</div>}
          {[...checkins].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30).map(c=>(
            <div key={c.date} className="saved-meal-card">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontWeight:600,fontSize:14}}>{formatDateFull(c.date)}</span><ScoreBadge score={c.score}/>
              </div>
              {c.analysis&&<div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>~{c.analysis.calories} kcal estimated</div>}
              {c.mealSlots&&MEAL_SLOTS.filter(s=>c.mealSlots[s.key]).map(s=>(
                <div key={s.key} style={{fontSize:12,color:"#9ca3af",marginBottom:3}}>
                  <span style={{color:"#4b5563"}}>{s.icon} {s.label}: </span>{c.mealSlots[s.key].substring(0,100)}{c.mealSlots[s.key].length>100?"…":""}
                </div>
              ))}
              {c.analysis?.summary&&<div style={{fontSize:12,color:"#60a5fa",marginTop:6,lineHeight:1.4}}>{c.analysis.summary}</div>}
              {c.analysis?.tip&&<div style={{fontSize:11,color:"#4b5563",marginTop:4,fontStyle:"italic"}}>💡 {c.analysis.tip}</div>}
            </div>
          ))}
          <div className="section-title" style={{marginTop:20}}>Weight log</div>
          {!weights.length&&<div className="no-data">No weights logged yet.</div>}
          {[...weights].sort((a,b)=>b.date.localeCompare(a.date)).map(w=>(
            <div key={w.date} className="weight-entry">
              <span style={{fontSize:14}}>{formatDateFull(w.date)}</span>
              <div style={{textAlign:"right"}}><span style={{fontWeight:700,color:"#4ade80",fontSize:16}}>{w.weight} kg</span>{w.notes&&<div style={{fontSize:11,color:"#6b7280"}}>{w.notes}</div>}</div>
            </div>
          ))}
        </>
      )}

      {modal&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}>
          {modal==="weight"&&<WeightModal onSave={e=>{saveWeight(e);setModal(null)}} onCancel={()=>setModal(null)}/>}
          {modal==="quicklog"&&<QuickLogModal existing={todayCI} onSave={handleQuickLogSave} onCancel={()=>setModal(null)}/>}
          {modal==="checkin"&&<CheckinModal user={user} savedMeals={meals} existing={todayCI} onSave={e=>{saveCI(e);setModal(null)}} onCancel={()=>setModal(null)}/>}
          {modal==="addmeal"&&<AddMealModal user={user} onSave={e=>{saveMeal(e);setModal(null)}} onCancel={()=>setModal(null)}/>}
        </div>
      )}
    </div>
  );
}

function WeightModal({onSave,onCancel}){
  const [date,setDate]=useState(today());
  const [weight,setWeight]=useState("");
  const [notes,setNotes]=useState("");
  return(
    <div className="modal">
      <span className="modal-handle"/>
      <div className="modal-title">⚖️ Log weight</div>
      <div className="form-group"><label className="form-label">Date</label><input type="date" className="form-input" value={date} max={today()} onChange={e=>setDate(e.target.value)}/></div>
      <div className="form-group"><label className="form-label">Weight (kg)</label><input type="number" step="0.1" inputMode="decimal" className="form-input" placeholder="e.g. 85.4" value={weight} onChange={e=>setWeight(e.target.value)}/></div>
      <div className="form-group"><label className="form-label">Notes (optional)</label><input type="text" className="form-input" placeholder="Any context…" value={notes} onChange={e=>setNotes(e.target.value)}/></div>
      <button className="submit-btn" disabled={!weight} onClick={()=>onSave({date,weight:parseFloat(weight),notes})}>Save weight</button>
      <button className="cancel-btn" onClick={onCancel}>Cancel</button>
    </div>
  );
}

function CheckinModal({user,savedMeals,existing,onSave,onCancel}){
  const [mealSlots,setMealSlots]=useState(existing?.mealSlots||emptyMeals());
  const [snack,setSnack]=useState(existing?.snack||"no");
  const [alcohol,setAlcohol]=useState(existing?.alcohol||"no");
  const [hungry,setHungry]=useState(existing?.hungry||"ok");
  const [wellnote,setWellnote]=useState(existing?.wellnote||"");
  const [improv,setImprov]=useState(existing?.improv||"");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(existing?.analysis||null);
  const [score,setScore]=useState(existing?.score||null);
  const [error,setError]=useState(null);
  const [section,setSection]=useState("meals");
  const voice=useContinuousVoice();

  function updateSlot(key,val){setMealSlots(prev=>({...prev,[key]:val}));setResult(null);setScore(null);}

  const hasAnyMeal=Object.values(mealSlots).some(v=>v.trim());

  async function analyse(){
    voice.stop();
    setLoading(true);setError(null);
    try{
      const r=await aiAnalyse(mealSlots,{snack,alcohol,hungry},user,savedMeals);
      if(r){setResult(r);setScore(r.score);}
    }catch(e){setError("Couldn't connect. Check your internet and try again. ("+e.message+")");}
    setLoading(false);
  }

  function handleSave(){
    voice.stop();
    onSave({mealSlots,snack,alcohol,hungry,wellnote,improv,score,analysis:result,
      food:MEAL_SLOTS.map(s=>mealSlots[s.key]?`${s.label}: ${mealSlots[s.key]}`:"").filter(Boolean).join("\n")
    });
  }

  // Simple non-continuous voice for the short note fields
  const [noteField,setNoteField]=useState(null);
  const noteRRef=useRef(null);
  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR)return;
    const r=new SR();r.continuous=false;r.interimResults=false;r.lang="en-GB";
    r.onresult=e=>{
      const t=Array.from(e.results).map(r=>r[0].transcript).join(" ");
      if(noteField==="well")setWellnote(v=>v?(v+" "+t):t);
      if(noteField==="improv")setImprov(v=>v?(v+" "+t):t);
      setNoteField(null);
    };
    r.onerror=()=>setNoteField(null);r.onend=()=>setNoteField(null);
    noteRRef.current=r;
  },[noteField]);
  function toggleNote(f){
    if(!noteRRef.current)return;
    if(noteField===f){noteRRef.current.stop();setNoteField(null);}
    else{setNoteField(f);setTimeout(()=>{try{noteRRef.current.start();}catch(_){}},60);}
  }
  const noteVoiceOk=!!(window.SpeechRecognition||window.webkitSpeechRecognition);

  return(
    <div className="modal">
      <span className="modal-handle"/>
      <div className="modal-title">📝 Full day log</div>
      <div className="modal-subtitle">Edit any meal, then get your AI score when you're done for the day.</div>

      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[["meals","🍽️ Meals"],["checkin","✅ Check-in"]].map(([s,l])=>(
          <button key={s} onClick={()=>setSection(s)} style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid",borderColor:section===s?"#2563eb":"#374151",background:section===s?"#1e3a5f":"none",color:section===s?"#93c5fd":"#6b7280",fontFamily:"Exo 2",fontSize:13,fontWeight:700,cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      {section==="meals"&&(
        <>
          {MEAL_SLOTS.map(slot=>(
            <MealSlot key={slot.key} slot={slot} value={mealSlots[slot.key]} onChange={val=>updateSlot(slot.key,val)} voice={voice}/>
          ))}
          {!result&&<button className="action-btn primary" style={{marginTop:4}} onClick={analyse} disabled={!hasAnyMeal||loading}>
            <div className="btn-icon" style={{background:"#2563eb"}}>✨</div>{loading?"Analysing…":"Get AI score for today"}
          </button>}
          {loading&&<div className="loading-state"><div className="spinner"/><div>Crunching your day…</div></div>}
          {error&&<div className="error-box">⚠️ {error}</div>}
          {result&&(
            <div className="ai-result">
              <div className="ai-result-title">AI analysis</div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><ScoreBadge score={score}/><span style={{fontSize:12,color:"#9ca3af"}}>~{result.calories} kcal estimated</span></div>
              {[["Protein",result.protein],["Carbs",result.carbs],["Veg & fibre",result.veg],["Fast 800 alignment",result.alignment]].map(([l,v])=>(
                <div key={l} className="ai-metric"><span className="ai-metric-label">{l}</span><span className="ai-metric-val" style={{color:["Excellent","High","Very High"].includes(v)?"#4ade80":["Good","Moderate"].includes(v)?"#fbbf24":"#f87171"}}>{v}</span></div>
              ))}
              <div className="ai-summary">{result.summary}</div>
              {result.tip&&<div style={{marginTop:8,fontSize:12,color:"#6b7280",fontStyle:"italic"}}>💡 {result.tip}</div>}
              <button style={{background:"none",border:"none",color:"#60a5fa",fontSize:12,cursor:"pointer",marginTop:10,padding:0}} onClick={()=>{setResult(null);setScore(null);setError(null);}}>Re-analyse ↺</button>
            </div>
          )}
        </>
      )}

      {section==="checkin"&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            <div><label className="form-label">Snacking?</label>
              <select className="sel" value={snack} onChange={e=>setSnack(e.target.value)}>
                <option value="no">None</option><option value="light">Light</option><option value="moderate">Moderate</option><option value="heavy">Heavy</option>
              </select>
            </div>
            <div><label className="form-label">Alcohol?</label>
              <select className="sel" value={alcohol} onChange={e=>setAlcohol(e.target.value)}>
                <option value="no">None</option><option value="light">1–2 drinks</option><option value="moderate">3–4 drinks</option><option value="heavy">5+ drinks</option>
              </select>
            </div>
          </div>
          <div className="form-group"><label className="form-label">How hungry were you?</label>
            <select className="sel" value={hungry} onChange={e=>setHungry(e.target.value)}>
              <option value="satisfied">Not very hungry — satisfied</option><option value="ok">Manageable — felt ok</option><option value="hungry">Quite hungry</option><option value="very">Very hungry / struggled</option>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">What went well?</label>
            <div style={{position:"relative"}}>
              <input type="text" className="form-input" style={{paddingRight:noteVoiceOk?54:14}} placeholder="e.g. Stuck to plan at lunch" value={wellnote} onChange={e=>setWellnote(e.target.value)}/>
              {noteVoiceOk&&<button type="button" style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",width:36,height:36,borderRadius:"50%",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,background:noteField==="well"?"#dc2626":"#1f2937",color:noteField==="well"?"#fff":"#9ca3af"}} onClick={()=>toggleNote("well")}>{noteField==="well"?"⏹":"🎙️"}</button>}
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">What to improve tomorrow?</label>
            <div style={{position:"relative"}}>
              <input type="text" className="form-input" style={{paddingRight:noteVoiceOk?54:14}} placeholder="e.g. Avoid evening snacking" value={improv} onChange={e=>setImprov(e.target.value)}/>
              {noteVoiceOk&&<button type="button" style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",width:36,height:36,borderRadius:"50%",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,background:noteField==="improv"?"#dc2626":"#1f2937",color:noteField==="improv"?"#fff":"#9ca3af"}} onClick={()=>toggleNote("improv")}>{noteField==="improv"?"⏹":"🎙️"}</button>}
            </div>
          </div>
        </>
      )}

      <button className="submit-btn" disabled={!hasAnyMeal} onClick={handleSave}>Save</button>
      <button className="cancel-btn" onClick={()=>{voice.stop();onCancel();}}>Cancel</button>
    </div>
  );
}

function AddMealModal({user,onSave,onCancel}){
  const [name,setName]=useState("");
  const [desc,setDesc]=useState("");
  const [loading,setLoading]=useState(false);
  const [estimated,setEstimated]=useState(null);
  const [error,setError]=useState(null);
  const voice=useContinuousVoice();

  async function estimate(){
    setLoading(true);setError(null);setEstimated(null);
    try{const r=await aiEstimateMeal(name,desc);if(r)setEstimated(r);}
    catch(e){setError("Couldn't estimate — check your connection.");}
    setLoading(false);
  }

  return(
    <div className="modal">
      <span className="modal-handle"/>
      <div className="modal-title">💾 Save a meal</div>
      <div className="form-group"><label className="form-label">Meal name</label><input type="text" className="form-input" placeholder="e.g. Ben's standard breakfast" value={name} onChange={e=>{setName(e.target.value);setEstimated(null);}}/></div>
      <div className="form-group">
        <label className="form-label">Description — speak or type</label>
        <div className="meal-slot" style={{marginBottom:0}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button type="button" className={`meal-voice-btn ${voice.activeKey==="desc"?"listening":"idle"}`} onClick={()=>voice.toggle("desc",desc,v=>{setDesc(v);setEstimated(null);})}>{voice.activeKey==="desc"?"⏹":"🎙️"}</button>
            <span style={{fontSize:13,color:"#6b7280"}}>Tap to speak the description</span>
          </div>
          <textarea style={{width:"100%",background:"#161920",border:"none",borderRadius:8,padding:"10px 12px",color:"#e8eaf0",fontFamily:"Open Sans",fontSize:14,outline:"none",resize:"none",lineHeight:1.6,minHeight:70,marginTop:10}} placeholder="What's in it?" value={desc} onChange={e=>{setDesc(e.target.value);setEstimated(null);}}/>
          {voice.activeKey==="desc"&&<div className="listening-bar" style={{marginTop:8}}><div className="listening-dot"/><span>Listening — tap ⏹ when done</span></div>}
          {voice.activeKey==="desc"&&voice.interim&&<div className="interim-text">{voice.interim}</div>}
        </div>
      </div>
      {!estimated&&<button className="action-btn primary" onClick={estimate} disabled={!name.trim()||!desc.trim()||loading}><div className="btn-icon" style={{background:"#2563eb"}}>✨</div>{loading?"Estimating…":"Estimate calories with AI"}</button>}
      {loading&&<div className="loading-state"><div className="spinner"/><div>Estimating nutrition…</div></div>}
      {error&&<div className="error-box">⚠️ {error}</div>}
      {estimated&&(
        <div className="ai-result" style={{marginBottom:16}}>
          <div className="ai-result-title">AI nutrition estimate</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <div style={{textAlign:"center"}}><div style={{fontFamily:"Exo 2",fontSize:22,fontWeight:700,color:"#4ade80"}}>{estimated.calories}</div><div style={{fontSize:11,color:"#6b7280",marginTop:2}}>kcal</div></div>
            <div style={{textAlign:"center"}}><div style={{fontFamily:"Exo 2",fontSize:16,fontWeight:700,color:"#93c5fd"}}>{estimated.protein}</div><div style={{fontSize:11,color:"#6b7280",marginTop:2}}>Protein</div></div>
            <div style={{textAlign:"center"}}><div style={{fontFamily:"Exo 2",fontSize:16,fontWeight:700,color:"#93c5fd"}}>{estimated.carbs}</div><div style={{fontSize:11,color:"#6b7280",marginTop:2}}>Carbs</div></div>
          </div>
          {estimated.notes&&<div style={{fontSize:12,color:"#6b7280",fontStyle:"italic",lineHeight:1.4}}>💡 {estimated.notes}</div>}
          <button style={{background:"none",border:"none",color:"#60a5fa",fontSize:12,cursor:"pointer",marginTop:10,padding:0}} onClick={()=>{setEstimated(null);setError(null);}}>Re-estimate ↺</button>
        </div>
      )}
      <button className="submit-btn" disabled={!name||!desc||!estimated} onClick={()=>{voice.stop();onSave({name,desc,calories:estimated?.calories||0,protein:estimated?.protein||"Good",carbs:estimated?.carbs||"Low",owner:user});}}>Save meal</button>
      <button className="cancel-btn" onClick={()=>{voice.stop();onCancel();}}>Cancel</button>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [data,setData]=useState(initData);
  return user
    ?<div className="app"><Dashboard user={user} data={data} setData={setData} onBack={()=>setUser(null)}/></div>
    :<div className="app"><HomeScreen onSelect={setUser}/></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
